refresh:
  quote_seconds: 5
  static_seconds: 60
  kline_seconds: 10

charts:
  time_granularity: "1m"
  lookback_points: 120

signal:
  pin_proximity_ratio: 0.003
  break_proximity_ratio: 0.008
  concentration_threshold: 0.33
  watch_proximity_ratio: 0.005
  trend_return_threshold: 0.004
  volume_spike_ratio: 1.3
  near_expiry_days: 5

wind:
  retry_count: 2
  retry_delay_seconds: 1.0
  option_chain_date_format: "%Y%m%d"
  realtime_fields:
    last: "rt_last"
    pre_close: "rt_pre_close"
    change: "rt_chg"
    pct_change: "rt_pct_chg"
    volume: "rt_vol"
    bid1: "rt_bid1"
    ask1: "rt_ask1"
  option_chain_fields:
    contract_code: "windcode"
    contract_name: "contract_code"
    option_type: "contract_code"
    strike: "w_info_strikeprice"
    expiry_date: "w_info_exercisingend"
    last: "rt_last"
    change: "rt_chg"
    pct_change: "rt_pct_chg"
    volume: "rt_vol"
    open_interest: "rt_open_interest"
    iv: ""
    delta: "delta"
    gamma: "gamma"
    vega: "vega"
    theta: "theta"
    multiplier: "s_info_tunit"
